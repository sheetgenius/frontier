      - "Operators planning custom or per-tenant execution images should track this; the sandbox is becoming a server-driven, configurable surface. It is on main, in no release."
    accessibility_impact: low
    accessibility_consequence:
      what_got_easier: "Selecting or customizing a sandbox image moves from editing a hardcoded preset list to a server-driven config name, so per-tenant images become reachable."
      who_can_use_now: "Operators needing custom or per-tenant execution images who were constrained to a fixed preset list."
      authority_visibility: "The SDK-version mismatch guardrail keeps a custom image from silently running against an incompatible server, preserving a visible compatibility boundary; impact held at low pending release."
    security_impact: low
    security_change: reframes
    security_consequence:
      threat_blocked_or_opened: "Reframes sandbox-spec selection as a server-driven control plane; the companion guardrail refuses an image whose agent-server SDK version mismatches."
      attacker_model: "An operator or tenant supplying a custom execution image incompatible with or hostile to the server contract."
      enforcement: runtime
      cost_to_operator: "Operators gain custom-image flexibility but must keep image SDK versions matched or be refused."
