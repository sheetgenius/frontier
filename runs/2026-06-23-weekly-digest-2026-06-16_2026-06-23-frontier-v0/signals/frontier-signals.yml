  - id: 2026-06-23-openhands-conversation-secret-enricher
    section: runtime
    source: openhands
    channel: main-unreleased
    title: "A per-user OAuth token now follows the user into the sandbox from any conversation start path"
    finding_ids: [2026-06-23-openhands-conversation-secret-enricher]
    why_action_bearing:
      - "PRs #14697 and #14650 (merged to main 2026-06-16, NOT tagged) generalize a per-user secret enricher that injects a user's linked Jira Data Center OAuth token into the sandbox from any conversation start path — web, Slack, and API — not just the originating Jira integration. A credential now follows the user into the runtime, with the blast radius that implies."
      - "Operators must reason explicitly about which start paths carry which secrets into a sandbox; the credential plane widened. It is on main, in no release."
    accessibility_impact: low
    accessibility_consequence:
      what_got_easier: "An agent started from any surface can now call back into Jira using the user's linked credential without re-linking per start path."
      who_can_use_now: "Operators running cross-surface (web/Slack/API) workflows that previously could not reach the user's linked OAuth token outside Jira-triggered jobs."
      authority_visibility: "This is the tension: convenience comes by flowing a credential into more sandbox paths, making the credential's reach less obvious — held at low precisely because authority became wider and less visible."
    security_impact: medium
    security_change: opens
    security_consequence:
      threat_blocked_or_opened: "Opens a wider credential-flow surface: a per-user OAuth token reaches sandboxes started from web, Slack, and API, not only Jira-triggered jobs."
      attacker_model: "Prompt injection or a compromised conversation on any start path reaching a credential that now flows there."
      enforcement: runtime
      cost_to_operator: "Operators must audit which start paths inject which secrets; the blast radius of a leaked or injected sandbox grew."
      residual: "Main-unreleased, and the broadened credential flow is by design — the exposure is which start paths carry which tokens."
    security_advisory: false
    receipts: ["https://github.com/OpenHands/OpenHands/pull/14697"]

  - id: 2026-06-23-pi-inspectable-compaction
    section: runtime
    source: pi-coding-agent
    channel: tagged-release
    title: "Pi compaction events now carry reason and willRetry so a harness can tell the trigger apart"
    finding_ids: [2026-06-23-pi-extension-compaction-event-context]
    why_action_bearing:
      - "v0.79.10 (PR #5962) adds `reason` and `willRetry` to the extension `session_before_compact` and `session_compact` events, so an extension can distinguish a manual `/compact` from a threshold auto-compaction from an overflow-retry flow. The runtime's context management becomes legible from the outside."
      - "Harness authors building on Pi extensions can now branch behavior on why compaction fired and whether it will retry, rather than inferring it."
    accessibility_impact: medium
    accessibility_consequence:
      what_got_easier: "Understanding why context was compacted moves from guesswork to a typed signal: extensions read `reason` and `willRetry` directly."
      who_can_use_now: "Extension and harness authors who needed to react to compaction but could not previously tell manual, threshold, and overflow flows apart."
      authority_visibility: "This makes runtime state more visible, not less — the change exposes the compaction trigger that was previously opaque, with no authority or credential cost."
    security_impact: none
    security_advisory: false
    receipts: ["https://github.com/earendil-works/pi/releases/tag/v0.79.10"]

  - id: 2026-06-23-flue-private-by-default-observability
    section: runtime
    source: flue
    channel: main-unreleased
    title: "Flue workflow runs go private by default and flue logs is removed (staged in Unreleased)"
    finding_ids: [2026-06-23-flue-workflow-runs-private-by-default, 2026-06-23-flue-logs-removed-typed-run-apis]
    why_action_bearing:
      - "Staged in the CHANGELOG `## Unreleased` section on main (NOT in the in-window v1.0.0-beta.1/beta.2 tags): workflow runs become private over HTTP unless the workflow separately exports a `runs: WorkflowRunsHandler`, admission receipts shrink to `{ runId }`, `streamUrl`/`offset` are dropped, and the `flue logs` command is removed in favor of typed SDK access (`client.runs.get()`/`events()`/`stream()`)."
      - "This is direction, not a shipped default: the in-window beta.1 tag still documents `flue logs` as functional with the old `{ streamUrl, offset }` envelope. Operators should plan migrations off `flue logs` and the old run envelope, but not assume the new default is live until it tags."
    accessibility_impact: low
    accessibility_consequence:
      what_got_easier: "Run inspection moves to typed SDK access (`client.runs.*`), which is more legible to programmatic consumers than the removed `flue logs` command."
      who_can_use_now: "SDK and platform integrators who wanted typed run inspection rather than a CLI log stream."
      authority_visibility: "Private-by-default keeps run data from leaking over HTTP without an explicit handler export, raising authority visibility; the cost is operators who relied on `flue logs` must migrate. Held at low because it is staged, not shipped."
    security_impact: medium
    security_change: closes
    security_consequence:
      threat_blocked_or_opened: "Closes a default-exposure path: workflow runs are no longer readable over HTTP unless the workflow explicitly exports a runs handler."
      attacker_model: "A third party reading run data over HTTP that was previously accessible by default."
      enforcement: policy
      cost_to_operator: "Operators must export a `runs` handler for HTTP access and migrate off `flue logs` and the `{ streamUrl, offset }` envelope."
      residual: "Staged in `## Unreleased` on main; not in any in-window release tag, so the running beta does not yet enforce it."
    security_advisory: false
    receipts: ["https://github.com/withastro/flue/blob/main/CHANGELOG.md"]

  - id: 2026-06-23-hermes-background-fanout-no-wallclock-bound
    section: runtime
    source: hermes-agent
    channel: tagged-release
    title: "Hermes shipped background fan-out delegation with no wall-clock bound on a busy worker"
    finding_ids: [2026-06-23-hermes-background-async-subagents-tagged]
    why_action_bearing:
      - "v0.17.0 ships background fire-and-forget fan-out delegation (#49734) in the same line of work that removed the default subagent wall-clock timeout (#45149). A heartbeat/inactivity backstop remains for a wedged worker, but the wall-clock bound on a productively-busy runaway worker is gone and not replaced; the only bound on the fan-out is one async-pool slot for the whole batch."
      - "Operators running long-horizon multi-agent Hermes work should re-introduce a spend or time bound themselves: a busy runaway background worker now has no wall-clock or cost ceiling."
    accessibility_impact: low
    accessibility_consequence:
      what_got_easier: "Spawning parallel background work via fire-and-forget fan-out becomes a first-class delegation primitive, lowering the friction of long-horizon multi-agent runs."
      who_can_use_now: "Operators orchestrating parallel background subagents who previously had to manage fan-out manually."
      authority_visibility: "This is a tension entry: the autonomy surface widened while the wall-clock bound on a busy worker was removed, so cost/time authority became less visible — held at low for the lost ceiling."
    security_impact: medium
    security_change: opens
    security_consequence:
      threat_blocked_or_opened: "Opens a runaway-exposure: a productively-busy background worker has no wall-clock or cost ceiling, only a progress-stall heartbeat backstop and a single async-pool slot per batch."
      attacker_model: "A runaway, looping, or prompt-influenced background worker that stays busy (so the inactivity backstop never fires)."
      enforcement: runtime
      cost_to_operator: "Operators must re-introduce a spend or wall-clock bound themselves; the default ceiling on a busy worker is gone."
      residual: "Only a heartbeat/inactivity backstop and a concurrency-slot limit remain; no wall-clock or cost bound on a busy worker."
    security_advisory: false
    receipts: ["https://github.com/NousResearch/hermes-agent/pull/49734"]

