schema_version: bitter.frontier_signals.v0
window:
  start: 2026-05-28
  end: 2026-06-03
run_id: 2026-06-03-weekly-digest-2026-05-28_2026-06-03-frontier-v0
signals:

  - id: 2026-06-03-claude-code-permission-rule-enforcement-cluster
    section: control-plane
    title: "Permission and deny rules now enforced as written across WebFetch, Windows paths, and Glob/Grep"
    source: claude-code
    finding_ids:
      - 2026-06-03-claude-code-webfetch-permission-rules
    why_action_bearing:
      - "Three distinct gaps where a configured permission/deny rule silently failed to apply are closed in the 2.1.160-2.1.162 line: custom WebFetch rules now override built-in preapproved domains, Windows rules with backslashes or case-variant paths now match, and Read deny rules now hide files from Glob and Grep results."
      - "Operators who wrote allow/deny policy and assumed it was enforced were running with a false sense of coverage; the fix is gated purely on upgrading past these versions, so the operator action is 'upgrade, then re-audit whether any policy was silently bypassed in the prior window.'"
      - "The Read-deny-vs-Glob/Grep gap is the sharpest: a file an operator denied for Read was still discoverable (and its path/contents surfaceable) via search tools, defeating the access-control intent."
    accessibility_impact: none
    security_impact: high
    security_change: closes
    security_consequence:
      threat_blocked_or_opened: "Closes three permission-bypass gaps: WebFetch reaching denied domains via the preapproved whitelist, Windows path rules silently not matching, and denied files leaking through Glob/Grep enumeration."
      attacker_model: "Prompt-injection or compromised-task content steering the agent toward a denied domain or a path the operator believed was walled off; also an operator-error model where policy was simply never enforced."
      enforcement: "policy"
      cost_to_operator: "Upgrade past 2.1.160-2.1.162; re-audit any allow/deny or Read-deny policy that ran on older builds, especially on Windows and any setup relying on Read-deny to hide secrets from search."
      residual: "Policy is only as good as the rules written; the fix restores enforcement of existing rules but does not author them. Operators must confirm their rule set actually covers the domains/paths they assumed it did."
    security_advisory: true
    receipts:
      - https://code.claude.com/docs/en/changelog

  - id: 2026-06-02-claude-code-execution-granting-config-write-prompts
    section: runtime
    title: "Writes to execution-granting config and shell startup files now prompt even in acceptEdits mode"
    source: claude-code
    finding_ids:
      - 2026-06-02-claude-code-build-tool-config-protection
    why_action_bearing:
      - "Two new guardrails land together: acceptEdits mode now prompts before writing build-tool config that grants code execution (.npmrc, .yarnrc*, bunfig.toml, .bazelrc, .pre-commit-config.yaml, .devcontainer/, etc.), and the agent now prompts before writing shell startup files (.zshenv, .zlogin, .bash_login) and ~/.config/git/."
      - "Operators who ran acceptEdits or auto-leaning modes previously had a silent write path into files that execute code on the next shell, install, or commit; the new prompt converts that into a confirmation checkpoint."
      - "The operator action is to recognize that these prompts will now fire and not blanket-allow them \u2014 the prompt is the supply-chain/persistence defense, so auto-approving it re-opens the vector."
    accessibility_impact: none
    security_impact: high
    security_change: closes
    security_consequence:
      threat_blocked_or_opened: "Closes a silent-write path into files that grant code execution on next shell login, package install, commit hook, or devcontainer build \u2014 the classic agent-persistence and supply-chain escalation vector."
      attacker_model: "Prompt-injection or malicious repo content steering the agent to write a payload into .npmrc/.zshenv/pre-commit config while running in acceptEdits or auto mode, executing on the operator's next routine action."
      enforcement: "runtime"
      cost_to_operator: "None to gain the protection (default after upgrade); operators must avoid blanket-allowing the new prompts, which would restore the silent path."
      residual: "List of protected files is finite; writes to other execution-granting surfaces not on the list still pass under acceptEdits. The prompt also depends on a human reviewing it rather than reflexively confirming."
    receipts:
      - https://code.claude.com/docs/en/changelog

  - id: 2026-06-03-claude-code-agent-status-observability
    section: control-plane
    title: "Agent view exposes why a session is blocked and fan-out progress for scripted supervision"
    source: claude-code
    finding_ids:
      - 2026-06-03-claude-code-agent-status-monitoring
    why_action_bearing:
      - "claude agents --json now includes a waitingFor field naming what a blocked session is waiting on (e.g. a permission prompt), and claude agents rows now show done/total progress before detail when work is fanned out."
      - "Operators scripting or monitoring agent fleets can now programmatically distinguish 'stuck on a permission prompt' from other waits and read parallel-task completion, which is the difference between a watchdog that can unblock a session and one that can only detect silence."
      - "The operator action is to wire waitingFor and the progress counter into supervision tooling so stuck-agent triage stops requiring a human to open each session."
    accessibility_impact: low
    accessibility_consequence:
      what_got_easier: "Determining why an agent session is blocked and how far fanned-out work has progressed, without opening each session manually."
      who_can_use_now: "Operators building programmatic supervision/watchdog tooling over claude agents --json, plus anyone visually monitoring parallel runs in the agent view."
      authority_visibility: "Improved: the blocking reason (e.g. a pending permission prompt) is now an explicit, queryable state rather than an opaque 'waiting'."
    security_impact: none
    receipts:
      - https://code.claude.com/docs/en/changelog

  - id: 2026-05-30-claude-code-auto-mode-bedrock-vertex-foundry
    section: control-plane
    title: "Auto Mode now available on Bedrock, Vertex, and Foundry for Opus 4.7 / 4.8"
    source: claude-code
    finding_ids:
      - 2026-05-30-claude-code-auto-mode-bedrock-vertex
    why_action_bearing:
      - "Auto Mode's permission-handling posture, previously tied to first-party Anthropic auth, now extends to the cloud provider APIs (AWS Bedrock, Google Vertex, Foundry) for Opus 4.7 and 4.8, opt-in via CLAUDE_CODE_ENABLE_AUTO_MODE=1."
      - "The operator decision is governance-shaped: teams running Claude Code through a cloud-provider procurement path can now deploy the reduced-prompt autonomy posture they could not before, which changes what consent ceremony exists on those deployments."
      - "Because Auto Mode shifts permission decisioning away from per-action prompts, an operator enabling it on a Bedrock/Vertex deployment must confirm their managed-settings deny rules carry the governance weight the prompts used to."
    accessibility_impact: none
    security_impact: low
    security_change: reframes
    security_consequence:
      threat_blocked_or_opened: "Neither opens nor closes a bypass directly, but relocates the autonomy/consent posture onto cloud-provider deployments \u2014 the same auto-mode governance trade-off now reaches Bedrock/Vertex/Foundry installs."
      attacker_model: "An operator over-trusting auto mode on a cloud-provider deployment where managed-settings deny rules were not configured to substitute for the removed per-action prompts."
      enforcement: "policy"
      cost_to_operator: "Opt-in env var, so no change unless enabled; if enabled, audit managed-settings deny coverage on the cloud-provider path before relying on it."
      residual: "Auto Mode's classifier/policy governance applies, but the operator must verify their specific cloud-provider deployment has the deny rules they expect."
    receipts:
      - https://code.claude.com/docs/en/changelog

  - id: 2026-06-03-codex-remote-exec-apikey-registration
    section: runtime
    title: "CLI 0.136.0 adds API-key registration for approved remote exec-server hosts"
    source: codex
    finding_ids:
      - 2026-06-02-codex-cli-0136-remote-exec
    why_action_bearing:
      - "An operator running remote execution can register approved hosts via API key instead of entering credentials per session, changing the remote-exec authentication model."
      - "This shifts trust to a pre-registered host allowlist keyed by API key \u2014 operators must decide which hosts are 'approved' and how those keys are scoped and rotated before enabling remote exec."
      - "Verification path: upgrade to 0.136.0, register a test host, confirm only approved hosts authenticate and that key scope/rotation behaves as expected before exposing remote execution."
    accessibility_impact: low
    accessibility_consequence:
      what_got_easier: "Standing up remote execution against trusted hosts without re-entering credentials each session."
      who_can_use_now: "Operators automating remote-host execution who previously gated on per-session credential entry."
      authority_visibility: "Mixed \u2014 convenience removes a per-session credential prompt; the standing API-key registration must be audited or it becomes ambient remote-exec authority. Downgraded to low for this reason."
    security_impact: medium
    security_change: reframes
    security_consequence:
      threat_blocked_or_opened: "Replaces per-session credential entry with a registered-host API-key model: blocks ad-hoc unapproved host connection but opens a standing-credential surface if keys leak or hosts are over-approved."
      attacker_model: "third-party network / supply-chain actor who obtains a registered API key, or an operator who over-broadly approves hosts."
      enforcement: "both"
      cost_to_operator: "Operators must now manage an approved-host registry and API-key lifecycle (scoping, rotation, revocation) rather than relying on ephemeral per-session credentials."
      residual: "Key scope, rotation, and revocation semantics are not documented in the changelog; whether a leaked key grants persistent remote exec is unverified."
    receipts:
      - https://developers.openai.com/codex/changelog

  - id: 2026-06-03-codex-bedrock-aws-managed-auth
    section: platform
    title: "Amazon Bedrock integration runs Codex models under AWS-managed authentication and billing"
    source: codex
    finding_ids:
      - 2026-06-02-codex-amazon-bedrock-integration
    why_action_bearing:
      - "An operator with AWS infrastructure can now run OpenAI models through Amazon Bedrock, moving authentication and billing under AWS IAM and cost allocation instead of an external OpenAI API path."
      - "This reframes where the trust and identity boundary sits \u2014 Codex model calls become AWS-native, which changes compliance and credential-management decisions for AWS-policy organizations."
      - "Verification path: provision Codex models via Bedrock, confirm IAM scoping and that no model traffic leaves the AWS-managed path before treating it as compliance-satisfying."
    accessibility_impact: none
    security_impact: low
    security_change: reframes
    security_consequence:
      threat_blocked_or_opened: "Reframes identity/billing from an external OpenAI API path to AWS IAM-managed access, letting operators apply existing IAM controls and keep traffic within AWS-managed boundaries."
      attacker_model: "operator/organization managing credential sprawl and external-API egress; not a specific external adversary."
      enforcement: "policy"
      cost_to_operator: "Operators must now manage Codex access through Bedrock/IAM rather than OpenAI API keys; the integration assumes AWS-native identity and billing setup."
      residual: "Changelog asserts AWS-managed auth/billing but does not detail data-handling, model-availability, or feature-parity differences versus the direct path; compliance equivalence is unverified."
    receipts:
      - https://developers.openai.com/codex/changelog

  - id: 2026-06-03-codex-ios-faceid-lock
    section: control-plane
    title: "ChatGPT iOS 1.2026.146 adds optional Face ID / passcode lock for Codex"
    source: codex
    finding_ids:
      - 2026-06-02-chatgpt-ios-1-2026-146-face-id
    why_action_bearing:
      - "An operator running Codex on iOS can now require Face ID or a passcode to open Codex, adding a device-level authority gate that did not exist before."
      - "It is optional, so the operator decision is whether to enable it as policy for mobile-deployed Codex access."
      - "Verification path: update to 1.2026.146, enable the lock, confirm Codex requires biometric/passcode on foreground before trusting mobile as an access surface."
    accessibility_impact: medium
    accessibility_consequence:
      what_got_easier: "Locking down mobile agent access with a familiar device-native gesture instead of an external MDM or no lock at all."
      who_can_use_now: "Operators using Codex on personal or shared iOS devices who needed an at-device access control to consider mobile safe."
      authority_visibility: "Authority became more visible \u2014 access to the agent is now gated behind a visible, user-recognizable lock rather than open on app launch."
    security_impact: medium
    security_change: closes
    security_consequence:
      threat_blocked_or_opened: "Closes the unlocked-device-access path: a lost/borrowed phone no longer grants immediate access to Codex sessions and any standing agent authority they carry."
      attacker_model: "end user / opportunistic local attacker with physical access to the unlocked device."
      enforcement: "runtime"
      cost_to_operator: "Operators/users must enable the optional lock (off by default) and accept a per-open authentication step; an unenabled lock leaves the prior exposure."
      residual: "Default-off means the protection only applies where explicitly enabled; protects the app surface, not the underlying account credentials or server-side session if compromised elsewhere."
    receipts:
      - https://developers.openai.com/codex/changelog

