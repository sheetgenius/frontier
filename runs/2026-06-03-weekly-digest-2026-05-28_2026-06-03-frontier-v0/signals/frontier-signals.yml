  - id: 2026-06-03-gemini-cli-v0-45-0-stable-release
    section: platform
    title: "v0.45.0 stable bundles terminal hardening, session-context cleanup, and an MCP blacklist-bypass fix"
    source: gemini-cli
    finding_ids:
      - 2026-06-03-gemini-cli-v0-45-0-release
    why_action_bearing:
      - "Operators on preview or older stable builds get a single upgrade decision: move to v0.45.0 to pick up Termux relaunch/resize fixes, session-context filtering on history resume, sequential tool execution for update_topic, Vim keybinding fixes, and an MCP blacklist-bypass prevention fix."
      - "The MCP blacklist-bypass prevention is the security-bearing item: it closes a path where a blacklisted MCP tool/server could still be reached, so operators relying on MCP allow/deny controls should upgrade before trusting the blacklist."
      - "Verification path: release tag v0.45.0 notes (published 2026-06-03T01:05:14Z) enumerate the bundled fixes."
      - "Single composite upgrade decision - bundled small fixes all gated on 'upgrade to v0.45.0' stay one signal."
    accessibility_impact: low
    accessibility_consequence:
      what_got_easier: "Termux users escape relaunch/resize loops and Vim-keybinding users get corrected bindings, making the CLI usable in environments where it previously looped or mis-input."
      who_can_use_now: "Mobile/Termux operators and Vim-keybinding users who were blocked by terminal instability can run the stable build."
      authority_visibility: "Session-context filtering on history resumption keeps stale context from leaking into resumed sessions, keeping what the agent acts on more visible to the operator."
    security_impact: medium
    security_change: closes
    security_consequence:
      threat_blocked_or_opened: "Closes an MCP blacklist bypass where a tool/server the operator had blacklisted could still be invoked, defeating the deny-list control."
      attacker_model: "A malicious or compromised MCP server, or a prompt-injection path, attempting to reach a tool the operator explicitly blacklisted."
      enforcement: "runtime"
      cost_to_operator: "Upgrade to v0.45.0; operators who depend on MCP blacklists for containment should treat this as a required upgrade before relying on the deny-list."
      residual: "Release notes assert the bypass is fixed; operators with high-assurance MCP deny-lists should still test that blacklisted tools are unreachable rather than assume coverage of every bypass variant."
    security_advisory: true
    receipts:
      - https://github.com/google-gemini/gemini-cli/releases/tag/v0.45.0

  - id: 2026-06-03-gemini-cli-policy-file-resilience
    section: control-plane
    title: "Policy file survives cross-device mounts and corruption via EBUSY fallback and TOML recovery"
    source: gemini-cli
    finding_ids:
      - 2026-06-03-gemini-cli-policy-resilience
    why_action_bearing:
      - "Operators running in containers with cross-device mounts no longer hit silent policy-update failures - atomic rename now falls back to copy-then-unlink on EBUSY/EXDEV."
      - "A corrupted policy TOML is auto-backed-up to .bak and rebuilt from scratch rather than blocking on a syntax error, removing a manual-intervention failure mode."
      - "Verification path: packages/core/src/policy/config.ts adds the fallback and recovery; persistence.test.ts covers both paths."
      - "Single operator class (operator persisting policy/permission config), single consequence (policy persistence no longer fails silently)."
    accessibility_impact: none
    security_impact: low
    security_change: reframes
    security_consequence:
      threat_blocked_or_opened: "Closes a fail-open-ish gap where a policy file that failed to persist or parse could leave the agent running without the operator's intended permission policy in effect."
      attacker_model: "Not an external attacker - the risk is an operator believing a permission policy is enforced when a write/parse failure had silently dropped it."
      enforcement: "runtime"
      cost_to_operator: "None beyond upgrading to v0.46.0-preview.0; recovery is automatic and writes a .bak for forensic review."
      residual: "Recovery rebuilds policy from scratch, so a corrupted policy is silently reset to defaults rather than restored - operators should re-verify intended policy after a .bak appears."
    receipts:
      - https://github.com/google-gemini/gemini-cli/commit/dceb2ea30650c3f6742e67ec71110857904e78b3

  - id: 2026-06-03-gemini-cli-fork-pr-target-trigger
    section: platform
    title: "CI labeler switched to pull_request_target, granting write context to fork PR runs"
    source: gemini-cli
    finding_ids:
      - 2026-06-03-gemini-cli-ci-fork-access
    why_action_bearing:
      - "Contributors and maintainers should note the PR-size labeler now runs under pull_request_target, which executes in the base-repo context with write-capable token access on fork PRs."
      - "This is the classic pwn-request surface: pull_request_target with any checkout or execution of fork-controlled content can leak the elevated token; operators forking or auditing the repo's CI should confirm the workflow does not check out and run untrusted PR code."
      - "Verification path: .github/workflows/pr-size-labeler.yml line 4 trigger change from pull_request to pull_request_target."
      - "Single decision for the repo-security auditor: review this workflow's token scope and whether it touches fork-controlled inputs."
    accessibility_impact: none
    security_impact: medium
    security_change: opens
    security_consequence:
      threat_blocked_or_opened: "Opens potential exposure of an elevated GITHUB_TOKEN to fork PR context (pull_request_target runs with base-repo secrets/write permissions)."
      attacker_model: "An external contributor opening a malicious fork PR attempting to exploit a pull_request_target workflow that consumes fork-controlled inputs to exfiltrate the token or push changes."
      enforcement: "policy"
      cost_to_operator: "Maintainers must audit the labeler workflow to confirm it only reads PR metadata (line counts) and never checks out/executes fork code under the elevated context."
      residual: "As observed the workflow only labels by line count, which is low-risk, but the trigger choice removes the structural safety of pull_request; any future edit that adds checkout/execution becomes immediately dangerous."
    receipts:
      - https://github.com/google-gemini/gemini-cli/commit/cfcecebe8069f3714641a68e2898593698f739ba

  - id: 2026-06-03-gemini-cli-flash-ga-flag-rollout
    section: control-plane
    title: "Gemini 3.5 Flash GA routes to flagged users via backend experiment flag, no client update"
    source: gemini-cli
    finding_ids:
      - 2026-06-03-gemini-cli-flash-ga-transition
    why_action_bearing:
      - "Operators auditing which model their CLI calls cannot rely on client version alone - model selection is now gated server-side by experiment flag GEMINI_3_5_FLASH_GA_LAUNCHED (ID 45780819) via hasGemini35FlashGAAccess()."
      - "Auto-routing logic silently switches to Flash GA when the flag is enabled for a user cohort, so the same binary can route to different models across users."
      - "Verification path: Config.hasGemini35FlashGAAccess() and the registered experiment flag determine routing; the model in use is no longer fully determined by local config."
      - "Single decision: operators must treat backend flag state as part of the model-routing audit surface."
    accessibility_impact: none
    security_impact: none
    receipts:
      - https://github.com/google-gemini/gemini-cli/commit/665228e983c611007c4e2d36550e67b34f75055e

  - id: 2026-06-03-hermes-agent-docker-insecure-optin
    section: control-plane
    title: "Docker dashboard insecure binding now requires explicit HERMES_DASHBOARD_INSECURE=1 opt-in"
    source: hermes-agent
    finding_ids:
      - 2026-05-29-hermes-agent-patch-release
    why_action_bearing:
      - "The dashboard no longer infers insecure mode from bind host, so operators whose Docker setups relied on that inference must add HERMES_DASHBOARD_INSECURE=1 explicitly or the dashboard will not bind insecurely."
      - "Existing Docker and hosted deployments must update env configuration before upgrading to v0.15.1 to avoid a broken or unexpectedly-secured dashboard."
      - "Verification path: upgrade to v0.15.1, set HERMES_DASHBOARD_INSECURE=1 only where intended, and confirm the dashboard binds as expected without falling back to host-derived inference."
    accessibility_impact: medium
    accessibility_consequence:
      what_got_easier: "Insecure-binding behavior is now an explicit, auditable env flag instead of a silent inference from bind host, making the dashboard's exposure posture legible."
      who_can_use_now: "Operators running Docker or hosted dashboards who need to reason clearly about whether their dashboard is exposed insecurely."
      authority_visibility: "Makes the insecure-exposure decision explicit and visible rather than derived implicitly, raising authority visibility for a security-sensitive binding."
    security_impact: medium
    security_change: closes
    security_consequence:
      threat_blocked_or_opened: "Removes silent insecure binding that could expose the dashboard when bind host was misread as a signal to drop auth; insecure mode now requires deliberate opt-in."
      attacker_model: "A network-adjacent attacker reaching a dashboard that was unintentionally bound insecurely because the host-inference heuristic mislabeled the deployment."
      enforcement: "both"
      cost_to_operator: "Audit Docker/hosted env config and set HERMES_DASHBOARD_INSECURE=1 only where insecure binding is genuinely intended before upgrading."
      residual: "Operators can still opt into insecure binding; the flag prevents accidental exposure but not deliberate misconfiguration."
    security_advisory: true
    receipts:
      - https://github.com/NousResearch/hermes-agent/releases/tag/v2026.5.29

  - id: 2026-06-03-hermes-agent-promptware-defense
    section: runtime
    title: "Promptware defense added against Brainworm-class prompt-injection attacks"
    source: hermes-agent
    finding_ids:
      - 2026-05-28-hermes-agent-velocity-release
    why_action_bearing:
      - "Operators running the agent against untrusted content (web, repos, MCP tool output) gain a built-in defense layer they should validate against their own injection test cases rather than assume blanket coverage."
      - "19 security-tagged issues were closed in the same release, so the upgrade is the gate for these protections; staying on prior versions leaves the injection surface unmitigated."
      - "Verification path: upgrade to v0.15.0 and run known Brainworm-class injection patterns to confirm the defense triggers before exposing the agent to untrusted input."
    accessibility_impact: none
    security_impact: high
    security_change: closes
    security_consequence:
      threat_blocked_or_opened: "Blocks Brainworm-class prompt-injection (promptware) attacks that hijack agent behavior via malicious instructions embedded in processed content."
      attacker_model: "An adversary who can place instructions in content the agent ingests \u2014 web pages, repository files, tool/MCP output \u2014 aiming to redirect the agent's actions."
      enforcement: "runtime"
      cost_to_operator: "Upgrade to v0.15.0; validate the defense against the operator's own injection corpus since vendor coverage is not a guarantee."
      residual: "Defense targets a known attack class; novel injection vectors outside Brainworm patterns may still pass, so untrusted-input handling still needs operator scrutiny."
    security_advisory: true
    receipts:
      - https://github.com/NousResearch/hermes-agent/releases/tag/v2026.5.28

  - id: 2026-06-03-hermes-agent-bitwarden-secrets
    section: control-plane
    title: "Bitwarden Secrets Manager integration replaces per-provider API keys"
    source: hermes-agent
    finding_ids:
      - 2026-05-28-hermes-agent-velocity-release
    why_action_bearing:
      - "Operators managing credentials must decide whether to migrate from per-provider API keys to centralized Bitwarden Secrets Manager, changing where secrets live and how they rotate."
      - "Centralized secret management enables rotation and revocation that scattered per-provider keys did not; an operator wiring CI/automation must re-point credential sourcing."
      - "Verification path: configure Bitwarden Secrets Manager on v0.15.0, confirm the agent resolves credentials from it, and test a rotation to verify the agent picks up the new secret."
    accessibility_impact: none
    security_impact: medium
    security_change: closes
    security_consequence:
      threat_blocked_or_opened: "Reduces exposure from long-lived, scattered per-provider API keys by centralizing secrets behind a managed store with rotation and revocation."
      attacker_model: "An attacker who obtains a leaked or stale per-provider key from config, env, or disk; centralized management shortens the window such a key stays valid."
      enforcement: "policy"
      cost_to_operator: "Stand up and configure Bitwarden Secrets Manager; migrate existing per-provider keys and update automation to source from it."
      residual: "Centralization shifts trust to the Bitwarden integration and its access controls; a compromised vault token or misconfigured access grants broad credential access."
    receipts:
      - https://github.com/NousResearch/hermes-agent/releases/tag/v2026.5.28

  - id: 2026-06-03-hermes-agent-multi-agent-platform
    section: control-plane
    title: "Kanban becomes a multi-agent orchestration platform with auto-decomposition, swarm topology, and worktree-per-task"
    source: hermes-agent
    finding_ids:
      - 2026-05-28-hermes-agent-velocity-release
    why_action_bearing:
      - "Operators who ran Kanban as a task board must now decide whether to adopt orchestrator auto-decomposition and swarm topology, which turn a queue into a self-spawning multi-agent fleet with new operating state to supervise."
      - "Per-task model overrides and worktree-per-task change the cost and isolation profile of every queued task; an operator must re-plan budget and concurrency."
      - "Verification path: deploy v0.15.0, queue a decomposable task, and confirm the orchestrator spawns the expected sub-agents in isolated worktrees before trusting it with real work."
    accessibility_impact: low
    accessibility_consequence:
      what_got_easier: "A single high-level task can be auto-decomposed and fanned out across agents without the operator hand-authoring each subtask or wiring worktrees."
