  - id: 2026-06-03-flue-v090-app-config-migration
    section: platform
    title: "v0.9.0 breaking app-config migration: routing/provider imports, provider-ID format, SDK mount paths, and beta session-state reset"
    source: flue
    finding_ids:
      - 2026-06-01-flue-v090-major-refactor
    why_action_bearing:
      - "Upgrading to v0.9.0 forces a developer to rewrite application imports: routing moves from `@flue/runtime/app` to `@flue/runtime/routing`, provider APIs and `observe` come from `@flue/runtime`, and Workers AI types from `@flue/runtime/cloudflare` \u2014 code will not compile until updated."
      - "Provider model values now require `provider-id/model-id` format and `registerProvider()`/`configureProvider()` must share one ID; SDK mount paths now derive from `baseUrl` pathname \u2014 both are silent runtime-behavior changes that mis-route calls if not updated."
      - "Persisted beta session state is now rejected; the operator must clear or migrate the session store before upgrading or sessions fail to restore \u2014 a distinct destructive pre-upgrade step gated on the same v0.9.0 cutover."
      - "All of these share one verb (update-before-upgrade) for one persona (the Flue app developer) and one verification path (build + smoke-test against v0.9.0), so they route as a single platform migration signal."
    accessibility_impact: high
    accessibility_consequence:
      what_got_easier: "Nothing got easier; this raises the migration cost. The provider-ID consistency and single `baseUrl` mount-path model do reduce future configuration ambiguity once adopted."
      who_can_use_now: "Existing Flue app developers on pre-v0.9.0 betas; no new operator class is enabled."
      authority_visibility: "Provider identity is now explicit and consistent (`provider-id/model-id`, shared registration ID), making which provider answers a call more visible in config."
    security_impact: low
    security_change: reframes
    security_consequence:
      threat_blocked_or_opened: "Rejecting persisted beta session state prevents silently restoring sessions whose serialization predates current redaction/validation rules, avoiding carry-forward of stale or unredacted persisted state."
      attacker_model: "An operator inheriting a pre-v0.9.0 session store whose persisted state may contain content written under older, weaker persistence guarantees."
      enforcement: "runtime"
      cost_to_operator: "Must clear or migrate the session store before upgrade; loses in-flight beta session history unless explicitly migrated."
      residual: "No automated migration path is provided; operators who script their own migration could reintroduce stale state. Not upgrade-blocking for security reasons, so not an advisory."
    receipts:
      - https://github.com/withastro/flue/blob/main/CHANGELOG.md

  - id: 2026-06-03-flue-v091-websocket-credential-hardening
    section: runtime
    title: "v0.9.1 strips WebSocket URL credentials and rejects blank requestIds"
    source: flue
    finding_ids:
      - 2026-06-02-flue-v091-websocket-security
    why_action_bearing:
      - "Operators deploying Flue on Cloudflare WebSockets get two upstream hardening fixes by upgrading to v0.9.1: query strings and fragments are stripped before attachment persistence, so URL-carried handshake credentials are no longer retained, and agent/workflow frames reject blank or whitespace-only `requestId` values."
      - "Both are the same consequence for one persona (the Cloudflare WebSocket operator) gated on the same upgrade, so they stay one signal; the operator action is to upgrade and confirm credentials are no longer in persisted attachments."
    accessibility_impact: none
    security_impact: medium
    security_change: closes
    security_consequence:
      threat_blocked_or_opened: "Stripping query strings/fragments before persistence stops handshake credentials carried in WebSocket URLs from being retained in Durable Object attachment storage; rejecting blank requestIds blocks frame-correlation ambiguity and unkeyed ping abuse."
      attacker_model: "An attacker with later read access to persisted attachment state (or who can exploit unkeyed/whitespace requestIds) attempting to recover URL-embedded credentials or confuse frame correlation."
      enforcement: "runtime"
      cost_to_operator: "Upgrade to v0.9.1; operators should also stop passing credentials in WebSocket URLs and use header-based auth, which is the durable fix."
      residual: "Credentials already persisted by pre-v0.9.1 versions remain in existing stores until rotated/cleared; the fix only prevents new retention. Not flagged advisory because the primary exposure requires existing read access to persisted state and the durable fix is operator-side (header auth)."
    receipts:
      - https://github.com/withastro/flue/blob/main/CHANGELOG.md

