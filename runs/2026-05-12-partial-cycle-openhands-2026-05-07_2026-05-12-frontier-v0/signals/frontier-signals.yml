schema_version: bitter.frontier_signals.v0
window:
  start: 2026-05-07
  end: 2026-05-12
signals:
  - id: 2026-05-12-openhands-subagent-delegation-and-critic-evaluation
    section: control-plane
    title: "Sub-agent delegation (opt-in) and critic evaluation GUI"
    source: openhands
    finding_ids:
      - 2026-05-12-openhands-subagent-delegation-and-critic-evaluation
    why_action_bearing:
      - "Operators running multi-task sessions can now enable sub-agent
        delegation via `enable_sub_agents`. Built-in sub-agents (bash-runner,
        code-explorer, general-purpose, web-researcher) handle scoped tasks with
        restricted tool surfaces. Default is off -- enable deliberately."
      - "Operators should configure `CRITIC_API_KEY` to route critic evaluation
        spend separately from the primary model key if centralized cost control
        matters."
      - "The critic display is deployment-controlled via
        `OH_ENABLE_CRITIC_BY_DEFAULT` (disabled by default). Deployments that
        want it enabled should set that flag; per-deployment toggle is
        `verification.critic_enabled`."
    accessibility_impact: medium
    factory_relevance: medium
