schema_version: bitter.frontier_signals.v0
run_id: 2026-07-02-weekly-digest-2026-07-01_2026-07-02-frontier-v0
window:
  start: 2026-07-01
  end: 2026-07-02
note: >
  Short live window. Four accepted signals out of 23 findings. The original fifth
  item, Agent Flywheel, was withdrawn on 2026-07-12 because v0.7.0 shipped before
  the declared window and the intake baseline was not an upstream product event.
  Its stable URL remains below as a correction record. In-window movement: Claude
  made background agents more autonomous, Hermes tagged its security wave, Codex
  removed a trace-log data leak, and Gemini fixed a memory-import symlink escape
  in nightly only.

signals:

  - id: 2026-07-02-agent-flywheel-assembly-layer-dangerous-defaults
    status: withdrawn
    correction:
      date: 2026-07-12
      reason: "Frontier added Agent Flywheel on July 2, but ACFS v0.7.0 shipped June 26. Source intake is not a product change inside the July 1-2 window, so this record is preserved but no longer counted as an accepted signal. The original safe-mode guidance was also too broad: safe mode skips one ACFS sudoers write but does not revoke existing or provider-supplied passwordless sudo."
      canonical_url: /profiles/agent-flywheel/
    section: control-plane
    source: agent-flywheel
    channel: tagged-release-intake
    title: "Withdrawn as a July 2 signal: Agent Flywheel v0.7.0 was an intake baseline"
    summary: "The intake still established a useful operator posture: ACFS scripts a sophisticated multi-agent VPS, but v0.7.0 safe mode neither removes its dangerous agent shortcuts nor guarantees that passwordless sudo is absent."
    finding_ids:
      - 2026-07-02-agent-flywheel-v0-7-0-tagged-release
      - 2026-07-02-agent-flywheel-vibe-mode-dangerous-agent-aliases
      - 2026-07-02-agent-flywheel-passwordless-sudo-vibe-default
      - 2026-07-02-agent-flywheel-antigravity-locked-always-proceed
      - 2026-07-02-agent-flywheel-dcg-hook-fail-open
      - 2026-07-02-agent-flywheel-openai-anthropic-license-rider
    why_action_bearing:
      - "At the intake tag, ACFS put Claude Code, Codex, Antigravity, shell tooling, coordination, update, and recovery machinery behind one installer. Several downstream installers still select upstream `latest`, so this is a scripted front door rather than a reproducible dependency lock."
      - "In v0.7.0, a safe-mode run skips ACFS's `NOPASSWD` write but does not remove a rule left by an earlier vibe run or a provider image. It also installs a shared zsh file whose `cc`, `cod`, `agy`, and `gmi` shortcuts select dangerous or always-proceed behavior."
      - "The tagged LICENSE includes a non-standard OpenAI/Anthropic rider. Potentially covered operators should read it and obtain their own legal guidance; Frontier is not opining on interpretation or enforceability."
    accessibility_impact: medium
    accessibility_consequence:
      what_got_easier: "A beginner can get Claude Code, Codex, Antigravity, shell tooling, and coordination tools on one VPS through one installer."
      who_can_use_now: "Individual operators willing to run a rebuildable VPS workflow and inspect the installed policy."
      authority_visibility: "The README makes the vibe-mode trade explicit, but safe mode neither gates the installed agent shortcuts nor cleans prior/provider passwordless-sudo state in v0.7.0."
    security_impact: high
    security_change: reframes
    security_consequence:
      threat_blocked_or_opened: "The intake exposed a deliberate dangerous-mode path and an incomplete safe-mode boundary: bypassed agent approvals remain available through installed shortcuts, and safe mode does not prove that passwordless sudo is absent."
      attacker_model: "A prompt-injected or mistaken agent command that reaches shell execution on a credentialed VPS account."
      enforcement: policy
      cost_to_operator: "Use rebuildable infrastructure, pin and review the tag, scope provider credentials, keep production secrets elsewhere, remove the dangerous shortcuts, and inspect every effective sudoers rule on any durable host."
      residual: "The Antigravity DCG hook allows commands on malformed input, a missing command, unavailable or timed-out DCG, and output without a blocking decision; the installer was read at tag but not executed locally. Safe mode was verified as a skipped write, not as a cleanup path."
    security_advisory: false
    receipts:
      - https://github.com/Dicklesworthstone/agentic_coding_flywheel_setup/blob/edaee4f6ceff772d4f56d42eda65b1d659fead73/acfs/zsh/acfs.zshrc#L526-L532
      - https://github.com/Dicklesworthstone/agentic_coding_flywheel_setup/blob/edaee4f6ceff772d4f56d42eda65b1d659fead73/install.sh#L4861-L4870
      - https://github.com/Dicklesworthstone/agentic_coding_flywheel_setup/blob/edaee4f6ceff772d4f56d42eda65b1d659fead73/scripts/providers/hetzner-cloud-init.yml#L41-L46
      - https://github.com/Dicklesworthstone/agentic_coding_flywheel_setup/blob/edaee4f6ceff772d4f56d42eda65b1d659fead73/scripts/lib/agy_locked.py#L41-L133
      - https://github.com/Dicklesworthstone/agentic_coding_flywheel_setup/blob/edaee4f6ceff772d4f56d42eda65b1d659fead73/LICENSE

  - id: 2026-07-02-claude-code-background-agents-commit-push-pr
    section: runtime
    source: claude-code
    channel: tagged-release
    title: "Claude Code background agents now commit, push, and open draft PRs instead of stopping to ask"
    finding_ids:
      - 2026-07-02-claude-code-v2-1-198-background-agents-commit-push-pr
    why_action_bearing:
      - "Claude Code v2.1.198 makes subagents background by default and says background agents launched from `claude agents` now commit, push, and open a draft PR after worktree code work instead of stopping to ask."
      - "Before upgrading shared repos, decide whether background agents may write commits and branches, wire Notification hooks, and rely on branch protection rather than a human sitting at the terminal."
    accessibility_impact: medium
    accessibility_consequence:
      what_got_easier: "Longer agent work can continue away from the foreground terminal."
      who_can_use_now: "Teams comfortable with draft PRs as the review boundary."
      authority_visibility: "A background task becomes a repository mutation path; the review object is the draft PR."
    security_impact: medium
    security_change: reframes
    security_consequence:
      threat_blocked_or_opened: "Opens more unattended repository mutation while retaining draft PR review as the visible checkpoint."
      attacker_model: "A delegated background agent acting on stale or over-broad task direction in a worktree."
      enforcement: policy
      cost_to_operator: "Re-audit branch protection, remote permissions, worktree cleanup, and notification delivery."
      residual: "The release notes state launching-agent messages are task direction, not user approval; local policy still has to enforce what can be pushed."
    security_advisory: false
    receipts:
      - https://github.com/anthropics/claude-code/releases/tag/v2.1.198

  - id: 2026-07-02-hermes-security-wave-tagged
    section: control-plane
    source: hermes-agent
    channel: tagged-release
    title: "Hermes v2026.7.1 tags the security wave that was main-only last issue"
    finding_ids:
      - 2026-07-02-hermes-agent-v2026-7-1-security-wave-tagged
    why_action_bearing:
      - "Hermes v2026.7.1 ships the prior main-only wave: MCP-config persistence hardening, cron `base_url` credential-exfiltration blocking, prefix-secret sentinels for file reads, Slack `xapp-` token redaction, browser cloud-metadata guardrails, resume/session scoping, and a dependency floor."
      - "Upgrade from v2026.6.19 if you were waiting for a tag. The channel question changed from 'run main or wait' to a normal release upgrade."
    accessibility_impact: none
    security_impact: high
    security_change: closes
    security_consequence:
      threat_blocked_or_opened: "Closes credential-exfiltration and secret-disclosure surfaces that were previously only fixed on main."
      attacker_model: "Prompt-injected or misconfigured sessions abusing MCP persistence, cron URLs, file-read sentinels, Slack token display, browser metadata access, or session resume scope."
      enforcement: both
      cost_to_operator: "Upgrade to v2026.7.1 and re-run any local MCP/cron/Slack integration tests."
      residual: "Release notes are the receipt for this bundle; no per-item advisory record was published in the harvested surface."
    security_advisory: false
    receipts:
      - https://github.com/NousResearch/hermes-agent/releases/tag/v2026.7.1

  - id: 2026-07-02-codex-trace-payload-scrub
    section: platform
    source: codex
    channel: tagged-release
    title: "Codex 0.142.5 stops writing full Responses WebSocket payloads to trace logs"
    finding_ids:
      - 2026-07-02-codex-v0-142-5-trace-payload-scrub
    why_action_bearing:
      - "Codex rust-v0.142.5 says full Responses WebSocket request payloads no longer go to trace logs."
      - "Upgrade where traces are retained, centralized, or shared. Then restrict or purge older traces because the old behavior may have logged prompts, repo content, or secret-bearing tool inputs."
    accessibility_impact: none
    security_impact: medium
    security_change: closes
    security_consequence:
      threat_blocked_or_opened: "Closes a telemetry data-exposure path through trace logs."
      attacker_model: "Anyone with access to retained Codex trace logs, including centralized logging readers and incident responders outside the repo team."
      enforcement: runtime
      cost_to_operator: "Upgrade and audit old trace retention."
      residual: "The release note does not say whether existing logs are scrubbed; assume they are not."
    security_advisory: false
    receipts:
      - https://github.com/openai/codex/releases/tag/rust-v0.142.5

  - id: 2026-07-02-gemini-memory-symlink-escape-nightly
    section: control-plane
    source: gemini-cli
    channel: preview-or-beta
    title: "Gemini CLI fixes a memory-import symlink escape in nightly only"
    finding_ids:
      - 2026-07-02-gemini-cli-nightly-memory-symlink-escape
      - 2026-07-02-gemini-cli-atfile-hardening-nightly-only
    why_action_bearing:
      - "Nightly v0.51.0-nightly.20260702.gff00dacd9 fixes a symbolic-link directory escape in the memory import processor."
      - "Stable users do not have a shipped fix yet. Avoid untrusted `GEMINI.md` memory imports or track the nightly until a preview/stable tag absorbs it."
    accessibility_impact: none
    security_impact: medium
    security_change: closes
    security_consequence:
      threat_blocked_or_opened: "Closes a host-file read path where a repository-controlled memory import can traverse through a symlinked directory."
      attacker_model: "A malicious or compromised repository opened by a Gemini CLI user with memory import processing enabled."
      enforcement: runtime
      cost_to_operator: "Wait for stable, use nightly knowingly, or turn off/avoid untrusted memory imports."
      residual: "The fix is nightly-only in this window; stable and preview channels remain carry-forward."
    security_advisory: false
    receipts:
      - https://github.com/google-gemini/gemini-cli/releases/tag/v0.51.0-nightly.20260702.gff00dacd9
      - https://github.com/google-gemini/gemini-cli/releases/tag/v0.51.0-nightly.20260701.g7f00c5fe5
