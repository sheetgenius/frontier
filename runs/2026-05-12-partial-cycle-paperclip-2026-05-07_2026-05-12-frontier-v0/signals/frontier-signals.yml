signals:
  - id: 2026-05-12-paperclip-secrets-vaults-and-cursor-cloud
    section: control-plane
    title: "Secrets provider vaults (AWS Secrets Manager), host env isolation fix,
      cursor_cloud adapter"
    source: paperclip
    finding_ids:
      - 2026-05-12-paperclip-secrets-vaults-and-cursor-cloud
    why_action_bearing:
      - "Operators running SSH-managed execution environments should upgrade
        immediately: the host env isolation fix (PR #5142) closes a path where
        host environment variables (API keys, tokens, paths) were being
        forwarded to remote execution targets."
      - "Operators managing credentials at scale should evaluate the AWS Secrets
        Manager import path in Secrets settings UI — this enables rotation-aware
        credential management with an access-event audit trail."
      - "Operators using Cursor as an adapter can now configure the new
        `cursor_cloud` adapter for cloud-hosted Cursor routing with session
        reuse, streaming, and cancellation."
    accessibility_impact: medium
    factory_relevance: high
