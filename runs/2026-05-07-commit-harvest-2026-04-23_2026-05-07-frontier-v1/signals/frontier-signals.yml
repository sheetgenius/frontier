schema_version: bitter.frontier_signal_set.v0
run_id: 2026-05-07-commit-harvest-2026-04-23_2026-05-07-frontier-v1
signals:
  - id: 2026-05-07-persistent-agent-state
    section: control-plane
    title: "Persistent agent state is becoming a product surface"
    confidence: high
    actionability: test
    sources: [ codex, gemini-cli, hermes-agent, openclaw ]
    supporting_findings:
      - findings/codex.md
      - findings/gemini-cli.md
      - findings/hermes-agent.md
      - findings/openclaw.md
    operator_consequence: "Developers need to know which goals, memory patches,
      recaps, sessions, and skill maintenance loops shaped a serious run."
    bitter_consequence: "Bitter adapters need explicit fields for agent-side goals,
      memory proposals, session ids, thread metadata, skill changes, and
      settlement status."
  - id: 2026-05-07-visible-computer-workcells
    section: runtime
    title: "The agent interface is becoming a visible computer"
    confidence: high
    actionability: test
    sources: [ agent-zero, openhands, paperclip, codex ]
    supporting_findings:
      - findings/agent-zero.md
      - findings/openhands.md
      - findings/paperclip.md
      - findings/codex.md
    operator_consequence: "A serious agent harness increasingly needs browser,
      desktop, file, runtime, sandbox, and artifact surfaces that can be
      inspected."
    bitter_consequence: "BitterGrid workcells should be visible, leased, bounded,
      resumable, and evidence-bearing rather than invisible remote shells."
  - id: 2026-05-07-permissions-secrets-and-sandboxes
    section: control-plane
    title: "Permissions, secrets, and sandboxes are moving into the foreground"
    confidence: high
    actionability: adapt
    sources: [ codex, gemini-cli, openhands, openclaw, paperclip, agent-zero ]
    supporting_findings:
      - findings/codex.md
      - findings/gemini-cli.md
      - findings/openhands.md
      - findings/openclaw.md
      - findings/paperclip.md
      - findings/agent-zero.md
    operator_consequence: "The harness must make trust state visible: what can be
      read, what can be changed, which credentials are exposed, and where
      execution happens."
    bitter_consequence: "BitterPass and permission profiles should model real
      harness state, not an idealized permission abstraction."
  - id: 2026-05-07-accessibility-is-frontier-capability
    section: platform
    title: "Accessibility is a frontier capability, not marketing polish"
    confidence: medium
    actionability: observe
    sources:
      [
        openclaw,
        agent-zero,
        hermes-agent,
        pi-coding-agent,
        gemini-cli,
        openhands
      ]
    supporting_findings:
      - findings/openclaw.md
      - findings/agent-zero.md
      - findings/hermes-agent.md
      - findings/pi-coding-agent.md
      - findings/gemini-cli.md
      - findings/openhands.md
    operator_consequence: "Everyday adoption depends on setup recovery, visible
      progress, voice/chat surfaces, readable UI, OAuth clarity, and fewer dead
      ends."
    bitter_consequence: "Bitter should not hide behind internal vocabulary. It must
      translate authority, evidence, and memory into interfaces ordinary
      builders can understand."
  - id: 2026-05-07-agent-company-control-planes
    section: control-plane
    title: "Agent systems are growing control planes"
    confidence: high
    actionability: test
    sources: [ paperclip, openhands, hermes-agent, codex, openclaw ]
    supporting_findings:
      - findings/paperclip.md
      - findings/openhands.md
      - findings/hermes-agent.md
      - findings/codex.md
      - findings/openclaw.md
    operator_consequence: "Once agents coordinate across tasks, runtimes, gateways,
      and integrations, operators need liveness, cost, role, session, and
      recovery controls."
    bitter_consequence: "Factory's run contract should connect charter, mandate,
      agent, runtime, authority, cost, evidence, and recovery path."
  - id: 2026-05-07-integrations-are-volatile
    section: platform
    title: "Integrations are volatile; the operating loop has to be durable"
    confidence: high
    actionability: adapt
    sources: [ pi-coding-agent, hermes-agent, openclaw, codex, gemini-cli, openhands ]
    supporting_findings:
      - findings/pi-coding-agent.md
      - findings/hermes-agent.md
      - findings/openclaw.md
      - findings/codex.md
      - findings/gemini-cli.md
      - findings/openhands.md
    operator_consequence: "Provider lists, plugin systems, transports, and model
      profiles will keep changing."
    bitter_consequence: "Bitter should keep agent adapters replaceable while
      preserving the charter, authority, evidence, verification, and memory
      loop."
