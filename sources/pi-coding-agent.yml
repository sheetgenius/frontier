schema_version: bitter.frontier_source_contract.v0
id: pi-coding-agent
label: Pi Coding Agent
owner: earendil-works / Mario Zechner
homepage: https://pi.dev/
primary_surfaces:
  - id: site
    kind: official_site
    url: https://pi.dev/
    priority: 1
    watch:
      - positioning
      - installation
      - modes
      - providers
      - design_principles
      - package_ecosystem
  - id: docs
    kind: official_docs
    url: https://pi.dev/docs/latest
    priority: 1
    watch:
      - quickstart
      - usage
      - sessions
      - context_files
      - system_prompt_files
      - compaction
      - skills
      - extensions
      - prompt_templates
      - themes
      - packages
      - rpc
      - sdk
      - providers
      - settings
  - id: repo
    kind: github_repo
    url: https://github.com/earendil-works/pi
    priority: 1
    watch:
      - releases
      - tags
      - commits
      - pull_requests
      - issues
      - packages_coding_agent
      - docs
      - examples
  - id: npm
    kind: package_registry
    url: https://www.npmjs.com/package/@mariozechner/pi-coding-agent
    priority: 2
    watch:
      - package_version
      - publication_date
      - dist_tags
accepted_evidence:
  - official_docs
  - official_site
  - github_release
  - tagged_release
  - maintainer_commit
  - merged_pr
  - package_registry_release
  - maintainer_authored_post
  - reproducible_local_probe
rejected_evidence:
  - unsourced_social_claim
  - third_party_summary_without_primary_link
  - speculation
  - stale_model_memory
  - benchmark_claim_without_method
  - duplicate_commentary
change_types:
  - capability
  - workflow
  - runtime
  - protocol
  - reliability
  - economics
  - security
  - ecosystem
  - evaluation
  - philosophy
  - accessibility
high_signal_patterns:
  - extension
  - skill
  - package
  - prompt template
  - theme
  - session tree
  - branch
  - share
  - export
  - AGENTS.md
  - SYSTEM.md
  - compaction
  - dynamic context
  - RPC
  - SDK
  - json mode
  - provider
  - login
  - permission
  - sandbox
  - MCP
  - subagent
  - plan mode
operator_questions:
  - Does this change how an operator can adapt the harness to their workflow?
  - Does this affect session portability, context shaping, extension design, package distribution, RPC, or SDK embedding?
  - Does Pi intentionally refusing a built-in feature create a Bitter product opening?
  - Does this change whether Bitter should wrap Pi as an agent adapter or borrow an extension-contract idea?
  - Does this make serious agent work easier to start, inspect, or control without hiding authority?
default_actionability:
  release: test
  docs_change: observe
  security_change: test
  breaking_change: adapt
  ecosystem_package: observe
  pricing_or_usage_change: observe
discovery:
  last_verified: 2026-05-12
  verified_by: manual_web
  confidence: high
  open_questions:
    - Which package-registry or package-index surface should be watched for Pi extension ecosystem movement?
  migration_note: >
    Canonical repo migrated from badlogic/pi-mono to earendil-works/pi.
    pi.dev explicitly links to earendil-works/pi as the source. Both repos
    show identical release v0.74.0 (2026-05-07), confirming the migration
    is complete. Updated 2026-05-12.
notes: >
  Watch Pi as a minimal, extensible terminal coding harness. It is important
  partly because of what it chooses not to include by default: subagents, plan
  mode, permission popups, MCP, and other governance features. That deliberate
  minimalism clarifies Bitter's wedge as the project workflow around coding
  agents: durable goals, permissions, evidence, verification, and memory.
