schema_version: bitter.frontier_source_contract.v0
id: agent-flywheel
label: Agent Flywheel
owner: Dicklesworthstone
homepage: https://agent-flywheel.com/
primary_surfaces:
  - id: repo
    kind: github_repo
    url: https://github.com/Dicklesworthstone/agentic_coding_flywheel_setup
    priority: 1
    watch:
      - releases
      - tags
      - readme
      - docs
    notes: >
      Releases and tags only -- NOT commits or pull requests. The repo had
      3,440 main-branch commits at intake against 7 tagged releases; the
      tag is the receipt surface that keeps this source finite. Cite a
      release tag or a file pinned to one, never a moving main URL.
  - id: homepage
    kind: official_site
    url: https://agent-flywheel.com/
    priority: 2
    watch:
      - methodology
      - cost_transparency
      - agent_lineup
      - installer_claims
      - security_posture
accepted_evidence:
  - tagged_release
  - github_release
  - readme_change
  - official_docs
  - maintainer_authored_post
  - reproducible_local_probe
rejected_evidence:
  - author_portfolio_outside_named_surfaces
  - untagged_main_branch_commits
  - unsourced_social_claim
  - third_party_summary_without_primary_link
  - self_reported_metric_without_independent_receipt
  - speculation
  - stale_model_memory
  - duplicate_commentary
  - seo_clone_or_mirror
change_types:
  - defaults
  - security
  - capability
  - cost
  - distribution
  - agent_lineup
  - breaking_change
  - ecosystem
research_lenses:
  - assembly_layer
  - default_setting_authority
  - installer_trust
  - cost_of_operation
  - multi_agent_cohabitation
  - solo_author_velocity
high_signal_patterns:
  - install.sh behavior change
  - default settings written for Claude Code / Codex / Antigravity
  - permission or auto-mode posture set by the installer
  - credential, token, or session handling
  - version or channel pins for the bundled agents
  - agent added to or dropped from the lineup
  - sudo or system-level configuration change
  - safety-tool enforcement vs. advice
  - published cost figures updated
operator_questions:
  - What defaults does the installer set across the three bundled tier-1 agents, and would their own vendors ship those defaults?
  - Does the installer pin agent versions and channels? An assembly layer inherits the released-is-not-merged problem for every tool it bundles.
  - Where do credentials and session state land on the VPS, and who can read them?
  - Do the bundled "safety tools" enforce anything, or advise? A warning is not a boundary.
  - Are the published operating costs ($440-656/month at intake) holding as the lineup changes?
default_actionability:
  release: study
  docs_change: observe
  defaults_change: note
  security: note
  cost_change: observe
  ecosystem_package: ignore
discovery:
  last_verified: 2026-07-02
  verified_by: operator_intake
  confidence: medium
  open_questions:
    - The solo-author-velocity receipt is arXiv:2606.07448 (Robbes, Matricon, Degueule, Hora, Zacchiroli, submitted 2026-06-05), whose top-35-organizations adoption figure includes the individual account dicklesworthstone among corporate orgs. Verify the exact placement relative to Microsoft from the PDF figure itself before writing the comparison in claim-bearing prose; the abstract page does not carry the figure, and the author's own "git-mogged all of Microsoft" post is commentary, not the receipt.
    - The profile README's self-reported figures (~185,914 contributions in the past year; 52+ agent subscriptions at ~$12K/month) need an independent receipt or a local count before appearing in claim-bearing prose.
    - First-harvest probe candidate -- what install.sh actually configures - sudo surface, credential paths, agent settings files written.
    - Do NTM and Agent Mail warrant named-surface status, or stay out of contract until a receipt arrives from elsewhere?
notes: >
  Watch Agent Flywheel as the assembly-layer calibration source: a third
  party deciding an operator's defaults for three tier-1 harnesses (Claude
  Code, Codex, Antigravity) at once, behind a single curl command, on
  infrastructure the operator owns. Its published cost transparency is
  directly on the publication's core question of what these tools cost the
  people who run them. THE SCOPE FENCE IS THE CONTRACT: the author maintains
  183+ public repositories at agent-amplified velocity, and everything
  outside the two named surfaces is rejected evidence by default. If another
  Dicklesworthstone project matters, it enters as an ordinary finding with
  an external receipt, not as standing coverage. The author's own output
  velocity is itself frontier evidence (solo-author-at-vendor-velocity), but
  that is a story to receipt once, not a tracking obligation.
