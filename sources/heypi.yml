operator_questions:
  - Does an approval actually block the tool call, or only surface a notification after the fact?
  - Is the audit trail complete enough to reconstruct who approved what, and is it tamper-evident?
  - What does a sandbox runtime (just-bash, Docker, Gondolin) actually isolate, and what leaks across it?
  - How are secrets handed to a tool without passing through chat, and where do they rest?
  - In a multiplayer channel, whose authority binds — the requester's, the approver's, or the agent's config?
  - Does heypi inherit Pi's "no governance in core" posture, or does it genuinely close that gap?
  - What durability does heypi NOT provide (it disclaims crash-replay), and what does an operator have to own themselves?
default_actionability:
  release: test
  docs_change: observe
  security_change: test
  breaking_change: adapt
  ecosystem_package: observe
  governance_change: test
discovery:
  last_verified: 2026-06-24
  verified_by: manual_web
  confidence: medium
  open_questions:
    - heypi publishes git tags but no GitHub "releases"; is the tag the canonical ship signal, or is npm publish the real channel?
    - Which governance surfaces (approvals, audit, sandbox, secrets) are on by default vs opt-in, and which bind at runtime vs surface only?
    - Which version line is "stable" once 0.2.0 leaves beta, and what is the support/upgrade contract?
    - What exactly does the Gondolin sandbox runtime provide relative to just-bash and Docker?
notes: >
  heypi is the governance-shell calibration source: the human-in-the-loop and
  audit layer that wraps a minimal coding harness (Pi) for team chat-ops. Watch
  it as the inverse of Pi — where Pi refuses to bake governance into its core,
  heypi's entire product is that governance shell (approvals with named
  approvers, an SQLite audit trail, sandboxed tools, encrypted secret handoff,
  scoped memory). The high-signal question is always enforcement vs surfacing:
  does an approval block the call, is the audit trail complete, does the sandbox
  isolate. Pay attention to the durability disclaimer (heypi explicitly does not
  replay in-flight turns after a crash) — it marks the boundary of what the
  operator must own. heypi is also a multiplayer/team contrast to OpenClaw's
  single-user gateway, and a governance-first contrast to eve's durability-first
  framing. Do not over-weight landing-page feature copy; require a doc or commit
  before treating a governance feature as real and enforced.
